name: Build & Deploy BridgePoint (ACA multi-container)

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write     # needed for OIDC login (recommended)
  contents: read

env:
  RESOURCE_GROUP: BridgePoint
  CONTAINERAPP_NAME: bridgepoint
  ACR_NAME: GM61Bridgepoint
  ACR_LOGIN_SERVER: gm61bridgepoint.azurecr.io

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- AUTH ---
      # Recommended: OIDC login (no long-lived secrets). See setup section below.
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- ACR LOGIN ---
      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      # --- BUILD & PUSH IMAGES ---
      # Option 1 (recommended): ACR build (remote) - matches what you've been doing locally.
      - name: Build & Push Backend (ACR build)
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image bridgepoint-backend:${{ github.sha }} \
            --file backend/Dockerfile \
            backend

      - name: Build & Push Frontend (ACR build)
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image bridgepoint-frontend:${{ github.sha }} \
            --file webapp/Dockerfile \
            webapp

      # --- DEPLOY (UPDATE IMAGES IN THE MULTI-CONTAINER APP) ---
      - name: Update Container App images
        run: |
          az containerapp update \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINERAPP_NAME \
            --set properties.template.containers[0].image=$ACR_LOGIN_SERVER/bridgepoint-frontend:${{ github.sha }} \
            --set properties.template.containers[1].image=$ACR_LOGIN_SERVER/bridgepoint-backend:${{ github.sha }}
