name: Build & Deploy BridgePoint (ACA multi-container, auto vN tags)

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: BridgePoint
  CONTAINERAPP_NAME: bridgepoint
  ACR_NAME: GM61Bridgepoint
  ACR_LOGIN_SERVER: gm61bridgepoint.azurecr.io

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # One small debug step (kept intentionally minimal):
      # proves subscription context + that the container app is visible before we attempt update.
      - name: Debug Azure context (minimal)
        run: |
          set -e
          echo "Deploy version: v${{ github.run_number }}"
          az account show -o table
          az containerapp show -g "${RESOURCE_GROUP}" -n "${CONTAINERAPP_NAME}" -o none

      - name: Login to ACR
        run: |
          set -e
          az acr login --name "${ACR_NAME}"

      - name: Build & Push Backend (ACR build) - v${{ github.run_number }}
        run: |
          set -e
          az acr build \
            --registry "${ACR_NAME}" \
            --image "bridgepoint-backend:v${{ github.run_number }}" \
            --file backend/Dockerfile \
            backend

      - name: Build & Push Frontend (ACR build) - v${{ github.run_number }}
        run: |
          set -e
          az acr build \
            --registry "${ACR_NAME}" \
            --image "bridgepoint-frontend:v${{ github.run_number }}" \
            --file webapp/Dockerfile \
            webapp

      - name: Update Container App images to v${{ github.run_number }}
        run: |
          set -e
          echo "Updating ${CONTAINERAPP_NAME} to v${{ github.run_number }}..."
          az containerapp update \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${CONTAINERAPP_NAME}" \
            --set properties.template.containers[0].image="${ACR_LOGIN_SERVER}/bridgepoint-frontend:v${{ github.run_number }}" \
            --set properties.template.containers[1].image="${ACR_LOGIN_SERVER}/bridgepoint-backend:v${{ github.run_number }}"