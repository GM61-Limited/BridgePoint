name: Build & Push BridgePoint Images (versioned)

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: GM61Bridgepoint
  ACR_LOGIN_SERVER: gm61bridgepoint.azurecr.io

jobs:
  build_images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=v$VERSION"
          echo "VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name "${ACR_NAME}"

      - name: Build & Push Backend (v${{ env.VERSION }})
        run: |
          az acr build \
            --registry "${ACR_NAME}" \
            --image "bridgepoint-backend:${VERSION}" \
            --file backend/Dockerfile \
            backend

      - name: Build & Push Frontend (v${{ env.VERSION }})
        run: |
          az acr build \
            --registry "${ACR_NAME}" \
            --image "bridgepoint-frontend:${VERSION}" \
            --file webapp/Dockerfile \
            webapp