name: Build & Deploy BridgePoint (ACA multi-container, auto on push)

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: BridgePoint
  CONTAINERAPP_NAME: bridgepoint
  ACR_NAME: GM61Bridgepoint
  ACR_LOGIN_SERVER: gm61bridgepoint.azurecr.io

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Quick sanity check so failures are obvious early
      - name: Verify target Container App exists
        run: |
          set -e
          az account show -o table
          az containerapp show -g "${RESOURCE_GROUP}" -n "${CONTAINERAPP_NAME}" -o none

      - name: Login to ACR
        run: |
          set -e
          az acr login --name "${ACR_NAME}"

      # Tag images as v{run_number} so you get nice v1/v2/v3 style versions
      - name: Build & Push Backend (ACR build) - v${{ github.run_number }}
        run: |
          set -e
          az acr build \
            --registry "${ACR_NAME}" \
            --image "bridgepoint-backend:v${{ github.run_number }}" \
            --file backend/Dockerfile \
            backend

      - name: Build & Push Frontend (ACR build) - v${{ github.run_number }}
        run: |
          set -e
          az acr build \
            --registry "${ACR_NAME}" \
            --image "bridgepoint-frontend:v${{ github.run_number }}" \
            --file webapp/Dockerfile \
            webapp

      # IMPORTANT: for multi-container apps, the CLI requires --container-name for each container update
      - name: Deploy to Azure Container App (update both containers)
        run: |
          set -e
          echo "Deploying BridgePoint v${{ github.run_number }}..."

          az containerapp update \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${CONTAINERAPP_NAME}" \
            --container-name "frontend" \
            --image "${ACR_LOGIN_SERVER}/bridgepoint-frontend:v${{ github.run_number }}"

          az containerapp update \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${CONTAINERAPP_NAME}" \
            --container-name "backend" \
            --image "${ACR_LOGIN_SERVER}/bridgepoint-backend:v${{ github.run_number }}"