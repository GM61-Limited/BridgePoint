

<div class="overview-page">
    <h2>Overview</h2>
    <p>This page provides a summary of your environment's key metrics and ETL activity.</p>

    <section id="metrics">
        <div class="metric-widget">
            <h3>Total ETL Jobs</h3>
            <div id="totalJobs">
                <!-- Dynamically populated via JS -->
            </div>
        </div>
        <div class="metric-widget">
            <h3>Active Connections</h3>
            <div id="activeConnections">
                <!-- Dynamically populated via JS -->
            </div>
        </div>
        <div class="metric-widget">
            <h3>Last ETL Run</h3>
            <div id="lastRun">
                <!-- Dynamically populated via JS -->
            </div>
        </div>
    </section>

    <section id="etlSummary">
        <h3>Recent ETL Job Activity</h3>
        <div id="etlJobsTable">
            <!-- Table or list of recent ETL jobs populated via JS -->
        </div>
    </section>
</div>
