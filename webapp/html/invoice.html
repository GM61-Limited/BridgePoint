<div class="invoice-page">
    <h2>Invoices</h2>
    <p>This page allows you to view and manage all invoices for your environment.</p>

    <section id="invoiceList">
        <h3>Invoice List</h3>
        <div id="invoiceTable">
            <!-- Dynamic invoice table populated via JS -->
        </div>
    </section>

    <section id="invoiceActions">
        <h3>Actions</h3>
        <button id="createInvoiceBtn">Create New Invoice</button>
        <button id="refreshInvoiceBtn">Refresh List</button>
        <button id="exportInvoiceBtn">Export Invoices</button>
    </section>

    <section id="invoiceFilters">
        <h3>Filters</h3>
        <p>Filter invoices by date, status, or client.</p>
        <div id="invoiceFilterControls">
            <!-- Dynamic filter controls populated via JS -->
        </div>
    </section>
</div>
