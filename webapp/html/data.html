

<div class="data-page">
    <h2>Data</h2>
    <p>This page allows you to view and manage your environment's data.</p>

    <section id="dataTables">
        <h3>Data Tables</h3>
        <div id="tableContainer">
            <!-- Dynamic tables populated via JS -->
        </div>
    </section>

    <section id="dataActions">
        <h3>Actions</h3>
        <button id="uploadDataBtn">Upload Data</button>
        <button id="refreshDataBtn">Refresh Tables</button>
        <button id="exportDataBtn">Export Data</button>
    </section>

    <section id="dataFilters">
        <h3>Filters</h3>
        <p>Apply filters to refine the data displayed in the tables.</p>
        <div id="filterControls">
            <!-- Dynamic filter controls populated via JS -->
        </div>
    </section>
</div>
