<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgePoint</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/js-base64@3.7.2/base64.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-top">
            <nav>
                <a href="#" class="active" data-tab="home" title="Home"><i class="fas fa-home"></i></a>
                <a href="#" data-tab="overview" title="Overview"><i class="fas fa-chart-pie"></i></a>
                <a href="#" data-tab="data" title="Data"><i class="fas fa-table"></i></a>
                <a href="#" data-tab="invoice" title="Invoice"><i class="fas fa-pound-sign"></i></a>
            </nav>
        </div>
        <div class="sidebar-bottom">
            <a href="#" id="settingsBtn" title="Settings"><i class="fas fa-gear"></i></a>
            <a href="#" id="logoutBtn" title="Logout"><i class="fas fa-right-from-bracket"></i></a>
        </div>
    </div>

    <div class="main">
        <header>
            <h1 id="pageTitle"></h1>
        </header>

        <div class="content" id="mainContent">
            <!-- Dynamic page content will be loaded here -->
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
