<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgePoint - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-card">
        <img src="images/bridgepointAlt.png" alt="GM61 Logo" style="display:block; margin: 0 auto 20px; max-width:150px;">
        <h1>BridgePoint</h1>
        <form id="loginForm" onsubmit="loginUser(event)">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="divider"><span>or</span></div>

        <div class="social-buttons">
            <button id="microsoftLogin" style="background-color:#2F2F2F; color:white; border:none;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft Logo" style="width:22px; height:22px; margin-right:10px;"> Sign in with Microsoft
            </button>
            <button id="githubLogin" style="background-color:#24292F; color:white; border:none;">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub Logo" style="width:22px; height:22px; margin-right:10px;"> Sign in with GitHub
            </button>
        </div>
         <img src="images/GM61Alt2.png" alt="GM61 Logo" style="display:block; margin: 30px auto 20px; max-width:175px;">
    </div>

    <script src="js/app.js"></script>
</body>
</html>
