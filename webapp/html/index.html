<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Portal - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-card">
        <img src="images/gm61.png" alt="GM61 Logo" style="display:block; margin: 0 auto 20px; max-width:150px;">
        <h1>Finance Portal</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="divider"><span>or</span></div>

        <div class="social-buttons">
            <button id="microsoftLogin" style="background-color:#2F2F2F; color:white; border:none;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft Logo" style="width:22px; height:22px; margin-right:10px;"> Sign in with Microsoft
            </button>
            <button id="githubLogin" style="background-color:#24292F; color:white; border:none;">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub Logo" style="width:22px; height:22px; margin-right:10px;"> Sign in with GitHub
            </button>
        </div>
    </div>

    <script>
        // Simple test login: username Admin / password Admin
        document.getElementById('loginForm').addEventListener('submit', function(e){
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "Admin" && pass === "Admin"){
                sessionStorage.setItem('loggedIn', 'true');
                window.location.href = "app.html";
            } else {
                alert("Invalid username or password");
            }
        });

        document.getElementById('microsoftLogin').addEventListener('click', function(){
            alert("Microsoft login not yet implemented.");
        });

        document.getElementById('githubLogin').addEventListener('click', function(){
            alert("GitHub login not yet implemented.");
        });
    </script>
</body>
</html>
