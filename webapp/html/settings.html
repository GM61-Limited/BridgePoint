

<div class="settings-page">
    <h2>Settings</h2>
    <p>Manage your profile, account, and environment settings from this page.</p>

    <section id="userProfile">
        <h3>User Profile</h3>
        <p>Name: <span id="profileName"></span></p>
        <p>Email: <span id="profileEmail"></span></p>
        <button id="updateProfileBtn">Update Profile</button>
        <button id="changePasswordBtn">Change Password</button>
    </section>

    <section id="environmentSettings">
        <h3>Environment Settings</h3>
        <p>Environment Name: <span id="envName"></span></p>
        <p>Domain: <span id="envDomain"></span></p>
        <button id="updateEnvBtn">Update Environment</button>
    </section>

    <section id="additionalSettings">
        <h3>Additional Settings</h3>
        <p>More configuration options and preferences can go here.</p>
    </section>
</div>
