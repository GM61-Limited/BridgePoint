# /etc/nginx/conf.d/default.conf

# Upstream to backend (Compose service name: "backend")
upstream backend_upstream {
    server backend:8000;
}

server {
  listen 80;
  server_name _;

  # Serve the React build
  root /usr/share/nginx/html;
  index index.html;

  # Static assets
  location /assets/ { try_files $uri =404; }
  location /images/ { try_files $uri =404; }

  # -------------------- API proxy --------------------
  location /api/ {

    # ✅ Allow larger uploads (washer XML can be big)
    # Pick a value that comfortably fits your largest expected file.
    client_max_body_size 100m;

    # Trailing slash: /api/login -> http://backend:8000/login
    proxy_pass http://backend_upstream/;
    proxy_http_version 1.1;

    # Forward full proxy context so backend builds correct URLs/cookies
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-Prefix /api;

    # If you discover absolute redirects coming back from the backend,
    # uncomment ONE of the following simple rewrites:
    # proxy_redirect http://backend:8000/ /;
    # proxy_redirect http://backend/ /;

    # Debug-only: if you suspect content-encoding issues, you can force plain upstream
    # (comment this out once things are working)
    # proxy_set_header Accept-Encoding "";

    proxy_connect_timeout 5s;

    # ✅ Increase timeouts for large uploads / slower clients
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # (Optional) buffering tweaks; usually fine to leave default.
    # proxy_request_buffering on;
  }

  # -------------------- OAuth proxy --------------------
  location /auth/ {
    # Preserve the /auth prefix upstream
    proxy_pass http://backend_upstream/auth/;
    proxy_http_version 1.1;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-Prefix /auth;

    # See note above; only enable if your backend returns absolute Location headers
    # proxy_redirect http://backend:8000/ /;
    # proxy_redirect http://backend/ /;
  }

  # -------------------- SPA fallback --------------------
  location / {
    try_files $uri /index.html;
  }
}
